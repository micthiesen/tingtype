# tingtype tuning config. Edit and restart (`tingtype restart`) to apply.
# Calibrate the detector against your actual signal with `tingtype monitor`.

[audio]
# Substring-matched (case-insensitive) against input device names/ids — Core Audio
# on macOS, PulseAudio/PipeWire sources *and* raw ALSA capture PCMs on Linux. Run
# `tingtype devices` to see the exact strings.
#
# The CUBILUX HLMS-C4 routes its live line input to ALSA capture DEV=1, but a raw
# `hw:` open is exclusive. To share it with Handy (STT) while keeping tingtype's
# low-latency raw-ALSA path, an `~/.asoundrc` dsnoop ("ting_shared") fans the one
# hardware stream out to multiple readers: tingtype reads it directly here, and
# the `ting-mic-bridge` service reads the same dsnoop to publish a virtual mic for
# Handy. An `alsa:<pcm>` spec targets that PCM verbatim (dsnoop PCMs aren't in
# `arecord -l`). Raw "hw:HLMSC4,1" also works but can't be shared.
#
# input_device is the one genuinely per-machine setting, so override it (and only
# it) in a gitignored `config.local.toml` that's deep-merged over this file — this
# Mac uses "CUBILUX HLMS-C4 Line IN" (Core Audio) there. The value below is just
# the fallback when no local override exists.
input_device = "alsa:ting_shared"
samplerate   = 48000

[detector]
# Chord tones in Hz. `tingtype gen` snaps these to FFT bin centers (fs/window).
tones                   = [2016, 2484, 3141]
window                  = 1024   # FFT size (samples); bin resolution = samplerate/window
hop                     = 256    # analysis stride (samples)
k_consecutive           = 4      # hot windows required before a chord onset
concentration_threshold = 0.5    # fraction of one-sided spectral energy in the target bins
per_band_min_share      = 0.08   # min share of energy each tone must carry (rejects single tones)
noise_floor             = [0, 0, 0]  # per-band power floor; 0 => auto-estimate at runtime
release_windows         = 4      # cold windows required to close a chord (bridges brief dropouts)
refractory_ms           = 0      # 0 so a double-tap's 2nd onset isn't swallowed (gesture bridges)
max_chord_ms            = 5000   # watchdog: force a release if a chord sticks this long

[gesture]
# A single short tap fires `primary`. `secondary` fires on EITHER a hold (tone
# present >= hold_ms, firing the instant it crosses — not on release) OR a
# double-tap (a 2nd onset within bridge_ms). bridge_ms is also the debounce
# buffer: a lone tap commits `primary` bridge_ms after the tone ends, so keep it
# tight. The ting sample must use hold/loop playmode so the tone sustains while
# the white button is held.
hold_ms   = 400
bridge_ms = 200

[actions]
# Keyspecs: "mod+mod+key". mods = cmd | shift | ctrl | opt/alt | fn.
primary   = "ctrl+opt+space"   # single short tap
secondary = "return"           # hold or double-tap (Enter)
